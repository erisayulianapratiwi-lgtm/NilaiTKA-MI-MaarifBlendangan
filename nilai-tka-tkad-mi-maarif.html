<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hasil Nilai TKA & TKAD — MI Maarif Blendangan</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-50: #eafbf3; --green-100: #c3f0d8; --green-500: #1a9e62;
    --green-600: #157a4c; --green-700: #0f5c38; --gold-400: #c89b3c;
    --gold-100: #fdf3dc; --bg: #f4f6f2; --surface: #ffffff;
    --border: #dce6d8; --text-primary: #1a2218; --text-secondary: #5a6b57;
    --text-muted: #8fa08a; --radius-sm: 8px; --radius-md: 12px;
    --radius-lg: 18px; --shadow: 0 4px 24px rgba(15,92,56,0.10);
  }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-primary);
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; padding: 0 1rem 4rem;
  }

  /* Hero banner */
  .hero {
    width: 100vw; margin-left: calc(-50vw + 50%);
    background: linear-gradient(150deg, #0d5236 0%, #1a9e62 60%, #27c47c 100%);
    padding: 2.5rem 1rem 4rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute;
    bottom: -40px; left: 0; right: 0; height: 80px;
    background: var(--bg);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  .hero-inner { position: relative; z-index: 1; }
  .logo-wrap {
    width: 90px; height: 90px; border-radius: 50%;
    background: #fff;
    border: 3px solid rgba(255,255,255,0.6);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    margin: 0 auto 1rem;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .logo-wrap img { width: 80px; height: 80px; object-fit: contain; }
  .hero h1 {
    font-family: 'Lora', serif;
    font-size: 22px; font-weight: 600;
    color: #fff; line-height: 1.4; margin-bottom: 6px;
  }
  .hero-badge {
    display: inline-block; font-size: 12px;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.92);
    border-radius: 99px; padding: 4px 14px; margin-bottom: 10px;
    letter-spacing: 0.05em;
  }
  .hero p { font-size: 13px; color: rgba(255,255,255,0.75); }

  /* Page wrapper */
  .page { display: none; width: 100%; max-width: 460px; }
  .page.active { display: block; }

  /* Card */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 1.75rem;
    margin-top: -1.5rem;
    position: relative; z-index: 2;
  }
  .card-title {
    font-size: 12px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 1.25rem;
  }

  /* Form */
  .field { margin-bottom: 1rem; }
  .field label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.04em;
  }
  .field input {
    width: 100%; padding: 10px 14px; font-size: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    background: #f8faf6; color: var(--text-primary); outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .field input:focus { border-color: var(--green-500); background: #fff; }
  .field input::placeholder { color: var(--text-muted); }

  .btn-primary {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, var(--green-600), var(--green-500));
    color: #fff; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer; margin-top: 0.5rem; letter-spacing: 0.02em;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 2px 12px rgba(21,122,76,0.3);
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }

  .error-msg {
    display: none; margin-top: 0.75rem;
    padding: 10px 14px;
    background: #fff5f5; border: 1px solid #fcc;
    border-radius: var(--radius-sm);
    font-size: 13px; color: #c0392b; text-align: center;
  }

  /* Decorative divider */
  .divider {
    text-align: center; margin: 1.25rem 0 1rem;
    position: relative;
  }
  .divider::before {
    content: ''; position: absolute; top: 50%; left: 0; right: 0;
    height: 1px; background: var(--border);
  }
  .divider span {
    position: relative; background: var(--surface);
    padding: 0 10px; font-size: 11px; color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  /* Info hint */
  .hint {
    font-size: 12px; color: var(--text-muted); text-align: center;
    margin-top: 1rem; line-height: 1.6;
  }
  .hint strong { color: var(--green-600); }

  /* Result */
  .siswa-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 1.5rem; padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--green-50); border: 2px solid var(--green-100);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 600; color: var(--green-600); flex-shrink: 0;
  }
  .siswa-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .siswa-nisn { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .tag-kelas {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--green-50); color: var(--green-600);
    border: 1px solid var(--green-100);
    border-radius: 99px; padding: 4px 12px; margin-bottom: 1.25rem;
  }

  .nilai-table { width: 100%; border-collapse: collapse; }
  .nilai-table th {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.07em;
    padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left;
  }
  .nilai-table th:nth-child(2), .nilai-table th:nth-child(3) { text-align: center; }
  .nilai-table td {
    padding: 11px 10px; font-size: 14px; color: var(--text-primary);
    border-bottom: 1px solid var(--border);
  }
  .nilai-table tr:last-child td { border-bottom: none; }
  .nilai-table td:nth-child(2) {
    text-align: center; font-weight: 600; font-size: 15px; color: var(--green-600);
  }
  .nilai-table td:nth-child(3) { text-align: center; }

  .badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 99px;
  }
  .badge-a { background: var(--green-50); color: var(--green-600); border: 1px solid var(--green-100); }
  .badge-b { background: #eaf3fb; color: #1a6fa0; border: 1px solid #c3e0f0; }
  .badge-c { background: var(--gold-100); color: var(--gold-400); border: 1px solid #f0dea8; }

  .rata-row td {
    background: var(--green-50); font-weight: 600;
    border-top: 1.5px solid var(--green-100);
  }

  .btn-back {
    display: block; width: 100%; margin-top: 1.25rem; padding: 10px;
    background: transparent; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--text-secondary); cursor: pointer; transition: background 0.15s;
  }
  .btn-back:hover { background: var(--bg); }

  .footer {
    text-align: center; margin-top: 2rem;
    font-size: 11px; color: var(--text-muted);
  }

  @media (max-width: 480px) {
    .hero { padding: 2rem 1rem 3.5rem; }
    .hero h1 { font-size: 19px; }
    .card { padding: 1.25rem; }
  }
</style>
</head>
